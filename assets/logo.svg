<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4B5FD"/>
      <stop offset="100%" style="stop-color:#E9D5FF"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>

  <!-- Kora strings - 5 lines converging from spread top to single point bottom -->
  <!-- Represents multiple agents converging into one result -->
  <line x1="156" y1="120" x2="256" y2="380" stroke="url(#glow)" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="206" y1="110" x2="256" y2="380" stroke="url(#glow)" stroke-width="3.5" stroke-linecap="round" opacity="0.75"/>
  <line x1="256" y1="105" x2="256" y2="380" stroke="url(#glow)" stroke-width="4" stroke-linecap="round" opacity="1"/>
  <line x1="306" y1="110" x2="256" y2="380" stroke="url(#glow)" stroke-width="3.5" stroke-linecap="round" opacity="0.75"/>
  <line x1="356" y1="120" x2="256" y2="380" stroke="url(#glow)" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Agent nodes at the top of each string -->
  <circle cx="156" cy="120" r="12" fill="#C4B5FD"/>
  <circle cx="206" cy="110" r="12" fill="#D8B4FE"/>
  <circle cx="256" cy="105" r="14" fill="#F3E8FF"/>
  <circle cx="306" cy="110" r="12" fill="#D8B4FE"/>
  <circle cx="356" cy="120" r="12" fill="#C4B5FD"/>

  <!-- Convergence point - the result -->
  <circle cx="256" cy="380" r="18" fill="#F3E8FF"/>
  <circle cx="256" cy="380" r="10" fill="url(#bg)"/>

  <!-- Horizontal bridge connecting the strings -->
  <path d="M 156 180 Q 256 160 356 180" stroke="url(#glow)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M 180 240 Q 256 225 332 240" stroke="url(#glow)" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.35"/>
  <path d="M 205 300 Q 256 290 307 300" stroke="url(#glow)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.25"/>
</svg>
