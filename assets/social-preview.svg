<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4B5FD"/>
      <stop offset="100%" style="stop-color:#E9D5FF"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Kora strings -->
  <line x1="570" y1="180" x2="640" y2="330" stroke="url(#glow)" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="605" y1="170" x2="640" y2="330" stroke="url(#glow)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="640" y1="165" x2="640" y2="330" stroke="url(#glow)" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="675" y1="170" x2="640" y2="330" stroke="url(#glow)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="710" y1="180" x2="640" y2="330" stroke="url(#glow)" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <circle cx="570" cy="180" r="5" fill="#C4B5FD" opacity="0.6"/>
  <circle cx="605" cy="170" r="5" fill="#D8B4FE" opacity="0.7"/>
  <circle cx="640" cy="165" r="6" fill="#F3E8FF"/>
  <circle cx="675" cy="170" r="5" fill="#D8B4FE" opacity="0.7"/>
  <circle cx="710" cy="180" r="5" fill="#C4B5FD" opacity="0.6"/>
  <circle cx="640" cy="330" r="7" fill="#F3E8FF" opacity="0.9"/>
  <circle cx="640" cy="330" r="3" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="640" y="420" text-anchor="middle" fill="#F3E8FF" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" letter-spacing="-1">kora</text>

  <!-- Tagline -->
  <text x="640" y="470" text-anchor="middle" fill="#8B7FD4" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400">Multi-agent development orchestration</text>
</svg>
