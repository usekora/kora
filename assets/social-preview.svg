<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6C5CE7"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4B5FD"/>
      <stop offset="100%" style="stop-color:#E9D5FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Kora strings (left side decoration) -->
  <g opacity="0.15">
    <line x1="80" y1="100" x2="200" y2="540" stroke="url(#glow)" stroke-width="2" stroke-linecap="round"/>
    <line x1="120" y1="80" x2="200" y2="540" stroke="url(#glow)" stroke-width="2" stroke-linecap="round"/>
    <line x1="160" y1="70" x2="200" y2="540" stroke="url(#glow)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="200" y1="80" x2="200" y2="540" stroke="url(#glow)" stroke-width="2" stroke-linecap="round"/>
    <line x1="240" y1="100" x2="200" y2="540" stroke="url(#glow)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="80" cy="100" r="5" fill="#C4B5FD"/>
    <circle cx="120" cy="80" r="5" fill="#D8B4FE"/>
    <circle cx="160" cy="70" r="6" fill="#F3E8FF"/>
    <circle cx="200" cy="80" r="5" fill="#D8B4FE"/>
    <circle cx="240" cy="100" r="5" fill="#C4B5FD"/>
    <circle cx="200" cy="540" r="8" fill="#F3E8FF"/>
    <circle cx="200" cy="540" r="4" fill="#302b63"/>
  </g>

  <!-- Logo mark -->
  <circle cx="640" cy="200" r="60" fill="url(#accent)" opacity="0.9"/>
  <line x1="610" y1="170" x2="640" y2="230" stroke="url(#glow)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="625" y1="165" x2="640" y2="230" stroke="url(#glow)" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  <line x1="640" y1="163" x2="640" y2="230" stroke="url(#glow)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="655" y1="165" x2="640" y2="230" stroke="url(#glow)" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  <line x1="670" y1="170" x2="640" y2="230" stroke="url(#glow)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <circle cx="610" cy="170" r="4" fill="#C4B5FD"/>
  <circle cx="625" cy="165" r="4" fill="#D8B4FE"/>
  <circle cx="640" cy="163" r="5" fill="#F3E8FF"/>
  <circle cx="655" cy="165" r="4" fill="#D8B4FE"/>
  <circle cx="670" cy="170" r="4" fill="#C4B5FD"/>
  <circle cx="640" cy="230" r="6" fill="#F3E8FF"/>
  <circle cx="640" cy="230" r="3" fill="url(#accent)"/>

  <!-- Title -->
  <text x="640" y="330" text-anchor="middle" fill="#F3E8FF" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" letter-spacing="-2">kora</text>

  <!-- Tagline -->
  <text x="640" y="380" text-anchor="middle" fill="#A78BFA" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400">Multi-agent development orchestration CLI</text>

  <!-- Pipeline visualization -->
  <g transform="translate(240, 440)">
    <rect x="0" y="0" width="100" height="36" rx="18" fill="#6C5CE7" opacity="0.3"/>
    <text x="50" y="23" text-anchor="middle" fill="#C4B5FD" font-family="system-ui, sans-serif" font-size="13" font-weight="500">Research</text>

    <line x1="105" y1="18" x2="125" y2="18" stroke="#6C5CE7" stroke-width="2" opacity="0.5"/>

    <rect x="130" y="0" width="90" height="36" rx="18" fill="#6C5CE7" opacity="0.3"/>
    <text x="175" y="23" text-anchor="middle" fill="#C4B5FD" font-family="system-ui, sans-serif" font-size="13" font-weight="500">Review</text>

    <line x1="225" y1="18" x2="245" y2="18" stroke="#6C5CE7" stroke-width="2" opacity="0.5"/>

    <rect x="250" y="0" width="80" height="36" rx="18" fill="#6C5CE7" opacity="0.3"/>
    <text x="290" y="23" text-anchor="middle" fill="#C4B5FD" font-family="system-ui, sans-serif" font-size="13" font-weight="500">Plan</text>

    <line x1="335" y1="18" x2="355" y2="18" stroke="#6C5CE7" stroke-width="2" opacity="0.5"/>

    <rect x="360" y="0" width="120" height="36" rx="18" fill="#A855F7" opacity="0.4"/>
    <text x="420" y="23" text-anchor="middle" fill="#E9D5FF" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Implement</text>

    <line x1="485" y1="18" x2="505" y2="18" stroke="#6C5CE7" stroke-width="2" opacity="0.5"/>

    <rect x="510" y="0" width="90" height="36" rx="18" fill="#6C5CE7" opacity="0.3"/>
    <text x="555" y="23" text-anchor="middle" fill="#C4B5FD" font-family="system-ui, sans-serif" font-size="13" font-weight="500">Audit</text>

    <line x1="605" y1="18" x2="625" y2="18" stroke="#6C5CE7" stroke-width="2" opacity="0.5"/>

    <rect x="630" y="0" width="100" height="36" rx="18" fill="#6C5CE7" opacity="0.3"/>
    <text x="680" y="23" text-anchor="middle" fill="#C4B5FD" font-family="system-ui, sans-serif" font-size="13" font-weight="500">Validate</text>
  </g>

  <!-- Subtle bottom text -->
  <text x="640" y="540" text-anchor="middle" fill="#6C5CE7" font-family="system-ui, sans-serif" font-size="16" font-weight="400" opacity="0.6">Research · Plan · Implement · Review · Validate</text>

  <!-- Right side strings decoration -->
  <g opacity="0.15">
    <line x1="1040" y1="100" x2="1080" y2="540" stroke="url(#glow)" stroke-width="2" stroke-linecap="round"/>
    <line x1="1080" y1="80" x2="1080" y2="540" stroke="url(#glow)" stroke-width="2" stroke-linecap="round"/>
    <line x1="1120" y1="70" x2="1080" y2="540" stroke="url(#glow)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="1160" y1="80" x2="1080" y2="540" stroke="url(#glow)" stroke-width="2" stroke-linecap="round"/>
    <line x1="1200" y1="100" x2="1080" y2="540" stroke="url(#glow)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="1040" cy="100" r="5" fill="#C4B5FD"/>
    <circle cx="1080" cy="80" r="5" fill="#D8B4FE"/>
    <circle cx="1120" cy="70" r="6" fill="#F3E8FF"/>
    <circle cx="1160" cy="80" r="5" fill="#D8B4FE"/>
    <circle cx="1200" cy="100" r="5" fill="#C4B5FD"/>
    <circle cx="1080" cy="540" r="8" fill="#F3E8FF"/>
    <circle cx="1080" cy="540" r="4" fill="#302b63"/>
  </g>
</svg>
